<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APG BOCHUM</title>
    <style>
        body { 
            background: #0f172a; color: white; font-family: Arial; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px; 
        }
        .card { 
            background: #1e293b; padding: 30px; border-radius: 20px; 
            width: 400px; text-align: center; border: 2px solid #38bdf8; 
        }
        h2 { color: #38bdf8; margin: 0 0 20px 0; }
        input { 
            width: 100%; padding: 14px; margin: 8px 0; 
            border-radius: 10px; border: 1px solid #475569; 
            background: #334155; color: white; font-size: 16px; 
            box-sizing: border-box;
        }
        button { 
            width: 100%; padding: 16px; background: #38bdf8; 
            color: #0f172a; border: none; border-radius: 12px; 
            font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; 
        }
        button:active { background: #0284c7; }
        .error { color: #f43f5e; margin-top: 10px; font-size: 14px; }
        .success { color: #4ade80; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="card" id="loginBox">
    <h2>⚡ APG LOGIN</h2>
    <p style="color:#94a3b8; margin-bottom:15px;">Nachname und Passwort</p>
    <input type="text" id="userInp" placeholder="Nachname">
    <input type="password" id="passInp" placeholder="Passwort">
    <button onclick="doLogin()">ANMELDEN</button>
    <div id="msg"></div>
    <p style="color:#64748b; font-size:12px; margin-top:15px;">Test: Test / test123</p>
</div>

<div class="card" id="welcomeBox" style="display:none;">
    <h2>✅ WILLKOMMEN!</h2>
    <p id="welcomeUser" style="font-size:18px; margin:20px 0;"></p>
    <button onclick="doLogout()">ABMELDEN</button>
</div>

<script>
// Basit şifre listesi
var passwords = {
    "Keskin": "admin123",
    "Test": "test123"
};

function doLogin() {
    var user = document.getElementById('userInp').value.trim();
    var pass = document.getElementById('passInp').value.trim();
    var msg = document.getElementById('msg');
    
    // Boş kontrol
    if (user === '' || pass === '') {
        msg.innerHTML = '❌ Bitte alles ausfüllen!';
        msg.className = 'error';
        return;
    }
    
    // Şifre kontrol
    if (passwords[user] && passwords[user] === pass) {
        msg.innerHTML = '';
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('welcomeBox').style.display = 'block';
        document.getElementById('welcomeUser').innerHTML = '👤 ' + user;
    } else {
        msg.innerHTML = '❌ Falscher Name oder Passwort!';
        msg.className = 'error';
    }
}

function doLogout() {
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('welcomeBox').style.display = 'none';
    document.getElementById('userInp').value = '';
    document.getElementById('passInp').value = '';
    document.getElementById('msg').innerHTML = '';
}
</script>

</body>
</html>
