<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APG BOCHUM SECURE PRO</title>
    
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="APG Secure">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">

    <style>
        :root { 
            --bg: #0f172a;
            --card: #1e293b; 
            --card2: #334155;
            --primary: #38bdf8; 
            --blue: #0284c7; 
            --text: #f8fafc; 
            --muted: #94a3b8;
            --danger: #f43f5e; 
            --success: #4ade80; 
            --warning: #fb923c;
            --border: #475569; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: linear-gradient(135deg, #0f172a, #1e293b); 
            color: var(--text); 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            min-height: 100vh; 
            padding: 10px; 
        }
        
        /* LOGIN */
        #loginScreen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(135deg, #0f172a, #1e293b); 
            z-index: 9999; display: flex; justify-content: center; align-items: center; 
        }
        .login-card { 
            background: var(--card); padding: 30px; border-radius: 20px; 
            border: 2px solid var(--primary); width: 95%; max-width: 450px; 
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
        }
        
        /* MAIN APP */
        #mainApp { 
            width: 100%; max-width: 700px; background: var(--card); 
            padding: 20px; border-radius: 20px; margin: auto; 
            border: 1px solid var(--border); display: none; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
        }
        .header { 
            text-align: center; border-bottom: 3px solid var(--primary); 
            margin-bottom: 20px; padding-bottom: 10px; 
        }
        .header h1 { margin: 0; color: var(--primary); font-size: 24px; }
        
        label { 
            display: block; margin: 15px 0 5px; color: var(--primary); 
            font-weight: bold; font-size: 13px; text-transform: uppercase; 
            letter-spacing: 0.5px; 
        }
        input, select { 
            width: 100%; padding: 12px; border-radius: 10px; 
            border: 1px solid var(--border); background: var(--card2); 
            color: var(--text); font-size: 14px; 
        }
        input:focus, select:focus { 
            outline: none; border-color: var(--primary); 
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2); 
        }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        
        .btn-schicht { 
            padding: 12px; background: #334155; border: 1px solid var(--border); 
            border-radius: 10px; color: var(--text); cursor: pointer; 
            font-weight: bold; font-size: 14px; transition: all 0.2s; 
            text-align: center; 
        }
        .btn-schicht.active { 
            background: var(--primary); color: #0f172a; border-color: var(--primary); 
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); 
        }
        
        .btn-primary { 
            width: 100%; padding: 16px; background: var(--primary); 
            color: #0f172a; border: none; border-radius: 12px; 
            font-weight: bold; font-size: 16px; margin-top: 20px; 
            cursor: pointer; transition: all 0.2s; 
        }
        .btn-primary:disabled { 
            background: #475569; color: #94a3b8; cursor: not-allowed; 
        }
        .btn-outline { 
            width: 100%; padding: 10px; margin-top: 10px; 
            background: transparent; border: 2px dashed var(--primary); 
            color: var(--primary); border-radius: 10px; cursor: pointer; 
            font-size: 13px; font-weight: bold; 
        }
        .btn-outline:hover { background: rgba(56, 189, 248, 0.1); }
        .btn-sm { 
            background: var(--blue); color: white; padding: 8px 12px; 
            border-radius: 8px; border: none; cursor: pointer; 
            font-size: 13px; font-weight: bold; 
        }
        .btn-danger { 
            background: var(--danger); color: white; padding: 8px 12px; 
            border-radius: 8px; border: none; cursor: pointer; 
            font-size: 13px; font-weight: bold; 
        }
        
        /* WORKER OVERLAY */
        #workerOverlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; 
            height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; 
            justify-content: center; align-items: center; 
        }
        .overlay-content { 
            background: var(--card); width: 95%; max-width: 450px; 
            max-height: 80vh; overflow-y: auto; border-radius: 20px; 
            padding: 25px; border: 1px solid var(--border); 
        }
        .worker-item { 
            padding: 12px; border-bottom: 1px solid var(--border); 
            cursor: pointer; font-size: 14px; 
        }
        .worker-item:hover { background: var(--card2); color: var(--primary); }
        
        .chip { 
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(56, 189, 248, 0.15); border: 1px solid rgba(56, 189, 248, 0.3);
            padding: 6px 12px; border-radius: 100px; font-size: 13px; 
            margin: 3px; 
        }
        .chip .remove { 
            color: var(--danger); cursor: pointer; font-weight: bold; 
        }
        
        /* ARTIKEL */
        .artikel-card { 
            background: var(--card2); padding: 15px; border-radius: 15px; 
            margin-top: 15px; border: 1px solid var(--border); 
            position: relative; 
        }
        .artikel-card h4 { 
            color: var(--primary); margin-bottom: 10px; font-size: 16px; 
        }
        
        .ft-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .ft-btn { 
            padding: 10px; background: #334155; border: 1px solid var(--border); 
            border-radius: 8px; color: var(--text); cursor: pointer; 
            font-size: 13px; font-weight: bold; text-align: center; 
        }
        .ft-btn.active { 
            background: var(--blue); color: white; border-color: var(--primary); 
        }
        
        .code-row { 
            margin-top: 8px; padding: 10px; background: var(--card); 
            border-radius: 10px; border: 1px solid var(--border); 
            display: flex; gap: 8px; align-items: center; flex-wrap: wrap; 
        }
        .code-row select { flex: 2; min-width: 150px; }
        .code-row input { flex: 1; min-width: 60px; }
        
        .status-badge { 
            display: inline-block; padding: 4px 10px; border-radius: 15px; 
            font-size: 11px; font-weight: bold; margin-top: 8px; 
        }
        .status-ok { background: var(--success); color: #0f172a; }
        .status-info { background: var(--warning); color: #0f172a; }
        
        /* DASHBOARD */
        #adminPanel { 
            width: 100%; max-width: 1200px; background: var(--card); 
            padding: 25px; border-radius: 20px; margin: auto; 
            border: 1px solid var(--border); display: none; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
        }
        .reports-grid { 
            display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px; 
        }
        @media(min-width: 768px) { .reports-grid { grid-template-columns: repeat(2, 1fr); } }
        @media(min-width: 1200px) { .reports-grid { grid-template-columns: repeat(3, 1fr); } }
        
        .report-box { 
            background: var(--card2); border: 1px solid var(--border); 
            padding: 18px; border-radius: 18px; 
        }
        .report-box:hover { border-color: var(--primary); }
        .badge-anlage { 
            display: inline-block; padding: 4px 10px; border-radius: 8px; 
            font-size: 12px; font-weight: bold; background: var(--primary); 
            color: #0f172a; margin-bottom: 8px; 
        }
        .report-date { font-size: 12px; color: #e2e8f0; margin-bottom: 8px; }
        .report-artikel { font-size: 14px; font-weight: bold; color: #fff; margin-bottom: 4px; }
        .report-ausschuss { font-size: 13px; color: #facc15; font-weight: bold; }
        .report-stoerung { font-size: 13px; color: var(--warning); font-weight: bold; }
        .report-workers { 
            font-size: 13px; margin-top: 8px; border-top: 1px solid var(--border); 
            padding-top: 8px; color: #fff; font-weight: bold; 
        }
        
        .filter-group { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; 
            max-width: 450px; margin: 15px auto; 
        }
        .filter-btn { 
            padding: 10px; background: #334155; border: 1px solid var(--border); 
            border-radius: 8px; color: var(--text); cursor: pointer; 
            font-weight: bold; text-align: center; 
        }
        .filter-btn.active { 
            border-color: var(--primary); background: var(--blue); 
        }
        
        .rights-box { 
            background: rgba(56, 189, 248, 0.08); border: 1px solid var(--border); 
            padding: 15px; border-radius: 12px; margin-bottom: 20px; 
        }
        .rights-box select { 
            padding: 8px; background: var(--card2); border: 1px solid var(--border); 
            color: var(--text); border-radius: 8px; font-size: 13px; 
            min-width: 150px; margin: 5px; 
        }
        
        .live-dot { 
            display: inline-block; width: 8px; height: 8px; 
            background: var(--success); border-radius: 50%; 
            animation: blink 2s infinite; 
        }
        @keyframes blink { 
            0%, 100% { opacity: 0.4; } 
            50% { opacity: 1; } 
        }

        .error-msg { color: var(--danger); font-size: 14px; margin-top: 12px; display: none; }
    </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
    <div class="login-card">
        <h2 style="color:var(--primary); margin:0 0 10px 0;">⚡ APG LOGIN</h2>
        <p style="font-size:14px; color: var(--muted); margin-bottom:20px;">Bitte Nachname und Passwort eingeben</p>
        <input type="text" id="userInp" placeholder="Nachname" style="margin-bottom: 10px;">
        <input type="password" id="passInp" placeholder="Passwort">
        <button class="btn-primary" onclick="login()" style="margin-top:15px;">ANMELDEN</button>
        <p id="loginError" class="error-msg"></p>
    </div>
</div>

<!-- MAIN APP (Mitarbeiter) -->
<div id="mainApp">
    <div class="header">
        <h1>Adler Pelzer Group</h1>
        <p id="currentUserDisplay" style="color:var(--success); font-weight:bold; margin-top:5px;"></p>
    </div>
    
    <div class="grid-2">
        <div>
            <label>📌 Schicht</label>
            <div class="grid-3">
                <div class="btn-schicht" id="mSchichtA" onclick="setSchicht('A')">A</div>
                <div class="btn-schicht active" id="mSchichtB" onclick="setSchicht('B')">B</div>
                <div class="btn-schicht" id="mSchichtC" onclick="setSchicht('C')">C</div>
            </div>
        </div>
        <div>
            <label>⏳ Schichtart</label>
            <div class="grid-3">
                <div class="btn-schicht" id="tFrueh" onclick="setSchichtType('Frühschicht')">Früh</div>
                <div class="btn-schicht active" id="tSpaet" onclick="setSchichtType('Spätschicht')">Spät</div>
                <div class="btn-schicht" id="tNacht" onclick="setSchichtType('Nachtschicht')">Nacht</div>
            </div>
        </div>
    </div>
    
    <label>👥 Mitarbeiter</label>
    <div id="workerDisplay" style="display:flex; flex-wrap:wrap; gap:5px; min-height:30px; margin-bottom:10px;"></div>
    <button class="btn-outline" onclick="openWorkerOverlay()">➕ Mitarbeiter hinzufügen</button>
    
    <div class="grid-2" style="margin-top:15px;">
        <div>
            <label>📅 Datum</label>
            <input type="date" id="datum">
        </div>
        <div>
            <label>🏭 Anlage</label>
            <select id="anlage" onchange="onAnlageChange(this.value)">
                <option value="">Bitte wählen...</option>
                <optgroup label="PUR">
                    <option value="PUR1">PUR 1</option><option value="PUR2">PUR 2</option>
                    <option value="PUR3">PUR 3</option><option value="PUR4">PUR 4</option>
                    <option value="PUR5">PUR 5</option><option value="PUR6">PUR 6</option>
                    <option value="PUR7">PUR 7</option><option value="PUR8">PUR 8</option>
                    <option value="PUR9">PUR 9</option>
                </optgroup>
                <optgroup label="Spritzguss">
                    <option value="IM1">IM 1</option><option value="IM2">IM 2</option>
                    <option value="IM3">IM 3</option><option value="IM4">IM 4</option>
                    <option value="IM5">IM 5</option><option value="CIM1">CIM 1</option>
                </optgroup>
                <option value="COM">Compound</option>
            </select>
        </div>
    </div>
    
    <div id="ftBox" style="display:none; margin-top:15px;">
        <label>🧩 Formträger (FT)</label>
        <div class="ft-grid">
            <div class="ft-btn" onclick="this.classList.toggle('active')">FT1</div>
            <div class="ft-btn" onclick="this.classList.toggle('active')">FT2</div>
            <div class="ft-btn" onclick="this.classList.toggle('active')">FT3</div>
            <div class="ft-btn" onclick="this.classList.toggle('active')">FT4</div>
            <div class="ft-btn" onclick="this.classList.toggle('active')">FT5</div>
            <div class="ft-btn" onclick="this.classList.toggle('active')">FT6</div>
        </div>
    </div>
    
    <div id="comTimeBox" style="display:none; text-align:center; background:rgba(56,189,248,0.15); border:1px solid var(--primary); padding:10px; border-radius:10px; margin-top:15px;">
        <span style="font-weight:bold; color:var(--primary);">Compound: <span id="comTotal">0</span> / 480 Min</span>
    </div>
    
    <div id="artikelContainer"></div>
    <button class="btn-outline" id="addArtikelBtn" disabled onclick="addArtikel()">📦 + Artikel hinzufügen</button>
    
    <button id="sendBtn" class="btn-primary" disabled onclick="sendReport()">🚀 SPEICHERN & SENDEN</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
    <div class="header" style="border-bottom:none; margin-bottom:10px;">
        <h1 style="font-size:22px;">📊 APG Live Dashboard</h1>
        <p id="adminUserDisplay" style="color:var(--primary); font-weight:bold; margin-top:5px;"></p>
        <p style="font-size:12px; margin-top:5px;"><span class="live-dot"></span> Live-Verbindung aktiv</p>
        
        <div id="rightsBox" class="rights-box" style="display:none;">
            <span style="font-size:13px; font-weight:bold; color:var(--primary);">🔐 Schichtleiter zuweisen:</span>
            <select id="rightsSelect" onchange="handleRightsChange(this.value)"></select>
            <select id="assignedSchichtSelect">
                <option value="A">Schicht A</option>
                <option value="B" selected>Schicht B</option>
                <option value="C">Schicht C</option>
            </select>
            <button class="btn-sm" onclick="grantRights()">➕ Erteilen</button>
            <div id="managersList" style="font-size:12px; color:var(--muted); margin-top:8px;"></div>
        </div>
        
        <div class="filter-group">
            <div class="filter-btn" id="fltA" onclick="filterSchicht('A')">🔵 Schicht A</div>
            <div class="filter-btn active" id="fltB" onclick="filterSchicht('B')">🟢 Schicht B</div>
            <div class="filter-btn" id="fltC" onclick="filterSchicht('C')">🟠 Schicht C</div>
        </div>
        <button class="btn-sm" onclick="loadDashboard()" style="display:block; margin:10px auto;">🔄 Aktualisieren</button>
    </div>
    <div id="reportsContainer" class="reports-grid"></div>
</div>

<!-- WORKER OVERLAY -->
<div id="workerOverlay">
    <div class="overlay-content">
        <h3 style="color:var(--primary); margin-bottom:15px;">👥 Mitarbeiter auswählen</h3>
        <div id="workerList"></div>
        <input type="text" id="manualWorker" placeholder="✏️ Manuell eingeben..." style="margin:10px 0;">
        <button class="btn-sm" onclick="addManualWorker()">➕ Hinzufügen</button>
        <button class="btn-primary" onclick="closeWorkerOverlay()" style="margin-top:10px;">Schließen</button>
    </div>
</div>

<script>
// ============================================
// APG BOCHUM SECURE PRO - KOMPLETT
// ============================================

// GOOGLE SCRIPT URL
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyZrtn1gIAacF3w659U3DSOump2-81pzTDoOO8hYQfplwrI4DdybpxUXhGYwssE0Dwqfg/exec";

// LOKALE PASSWÖRTER (YEDEK)
const LOCAL_PASSWORDS = {
    "Keskin": "admin123",
    "Test": "test123",
    "Keskin Mur.": "murat123",
    "Keskin Mustafa": "musti123",
    "Kunert M.": "kunert123"
};

const SUPER_ADMIN = "Keskin";
let currentUser = "";
let currentSchicht = "B";
let currentSchichtType = "Spätschicht";
let selectedStaff = [];
let schichtLeiterDb = {};
let activeFilter = "B";
let artikelCounter = 0;

// LocalStorage'dan Schichtleiter verilerini yükle
try {
    schichtLeiterDb = JSON.parse(localStorage.getItem('apg_schichtleiter_db') || '{}');
} catch(e) {}

// Tarihi bugüne ayarla
function setToday() {
    const d = new Date();
    document.getElementById('datum').value = 
        `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// Google'dan şifreleri dene
async function tryGooglePasswords() {
    try {
        const res = await fetch(`${SCRIPT_URL}?action=getSifreler&_cb=${Date.now()}`);
        if (res.ok) {
            const data = await res.json();
            if (Object.keys(data).length > 0) return data;
        }
    } catch(e) {
        console.log("Google nicht erreichbar, lokale Passwörter werden verwendet.");
    }
    return null;
}

// LOGIN
async function login() {
    const user = document.getElementById('userInp').value.trim();
    const pass = document.getElementById('passInp').value.trim();
    const errorDiv = document.getElementById('loginError');
    
    if (!user || !pass) {
        errorDiv.innerText = "❌ Bitte Nachname und Passwort eingeben!";
        errorDiv.style.display = 'block';
        return;
    }
    
    // Önce lokal dene
    if (LOCAL_PASSWORDS[user] && LOCAL_PASSWORDS[user] === pass) {
        errorDiv.style.display = 'none';
        enterApp(user);
        return;
    }
    
    // Google'ı dene
    errorDiv.innerText = "⏳ Verbindung zum Server...";
    errorDiv.style.display = 'block';
    errorDiv.style.color = 'var(--primary)';
    
    const googlePw = await tryGooglePasswords();
    
    if (googlePw && googlePw[user] && googlePw[user] === pass) {
        errorDiv.style.display = 'none';
        enterApp(user);
    } else if (googlePw && Object.keys(googlePw).length > 0) {
        errorDiv.innerText = "❌ Falscher Nachname oder Passwort!";
        errorDiv.style.color = 'var(--danger)';
    } else {
        errorDiv.innerText = "⚠️ Server nicht erreichbar.\nLokal: Test / test123";
        errorDiv.style.color = 'var(--warning)';
    }
}

// Uygulamaya giriş
function enterApp(user) {
    currentUser = user;
    document.getElementById('loginScreen').style.display = 'none';
    setToday();
    
    if (user === SUPER_ADMIN) {
        // Admin
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('adminUserDisplay').innerHTML = "👑 Haupt-Admin: " + user;
        document.getElementById('rightsBox').style.display = 'block';
        loadUserSelect();
        updateManagersList();
        filterSchicht('B');
    } else if (schichtLeiterDb[user]) {
        // Schichtleiter
        const s = schichtLeiterDb[user];
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('adminUserDisplay').innerHTML = "🏃 Schichtleiter: " + user + " (Schicht " + s + ")";
        document.getElementById('rightsBox').style.display = 'none';
        document.querySelectorAll('.filter-btn').forEach(b => b.style.display = 'none');
        const btn = document.getElementById('flt' + s);
        if (btn) { btn.style.display = 'block'; btn.classList.add('active'); }
        filterSchicht(s);
    } else {
        // Normal çalışan
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('currentUserDisplay').innerHTML = "👤 Angemeldet: " + user;
        
        // Hangi vardiyada olduğunu bul
        let found = "B";
        const workerData = getWorkerData();
        if (workerData["A"].some(w => w.includes(user) || user.includes(w.split(" ")[0]))) found = "A";
        if (workerData["C"].some(w => w.includes(user) || user.includes(w.split(" ")[0]))) found = "C";
        setSchicht(found);
    }
}

// Mitarbeiter verileri
function getWorkerData() {
    return {
        "A": ["Kunert M.", "Karali O.", "Mikuczynski K.", "Türkmen E.", "Amrouch M.", "Stania D.", "Kantaroglu A.", "Krancioch A.", "Held D.", "Berisha I.", "Neji M.", "Mulugeta G.", "Udezue P.", "Jansen M.", "Aksoy O.", "Yildirim S.", "Brand N.", "Louze A.", "Blanquez Romero V.", "Diallo M.D.", "Sener E.", "Klomrit", "Garcia"],
        "B": ["Keskin Mur.", "Aldirmaz P.", "Anderwald R.", "Bayrakli F.", "Kilic D.", "Maafi T.", "Besche T.", "Eickhoff P.", "Toth Renata", "Gibba n.", "Helf A.", "Isbir J.", "Jeyakumar S.", "Kalisch T.", "Kowarsch R.", "Nowak M.", "Pähler D.", "Patarcsity V.", "Pulendran K.", "Sahin E.", "Savas S.", "Schiavitelli", "Uluyüz B.", "Uzun S.", "Klomrit", "Garcia"],
        "C": ["Beher T.", "Keskin Mustafa", "Kantaroglu Ö.", "Savas R.", "Rafo S.", "Gertz Kevin", "Gertz S.", "Schönborn Ch.", "Fortes Ch.", "Sakaguchi M.", "Mercan M.", "Krämer Ch.", "Juretzka T.", "Kumbara E.", "Skupio D.", "Skrago T.", "Bah A.", "Kaya A.", "Jdea A.", "Toure A.", "Schneider D.", "Tchaleu Bertrand", "Keskinmus", "Klomrit", "Garcia"]
    };
}

// Code verileri
function getCodeData() {
    return {

// Schicht seçimi
function setSchicht(s) {
    currentSchicht = s;
    ['A','B','C'].forEach(x => document.getElementById('mSchicht'+x).classList.remove('active'));
    document.getElementById('mSchicht'+s).classList.add('active');
    selectedStaff = [];
    renderStaff();
    if (s === "A") setSchichtType('Frühschicht');
    else if (s === "B") setSchichtType('Spätschicht');
    else setSchichtType('Nachtschicht');
}

function setSchichtType(t) {
    currentSchichtType = t;
    ['tFrueh','tSpaet','tNacht'].forEach(x => document.getElementById(x).classList.remove('active'));
    if (t === 'Frühschicht') document.getElementById('tFrueh').classList.add('active');
    else if (t === 'Spätschicht') document.getElementById('tSpaet').classList.add('active');
    else document.getElementById('tNacht').classList.add('active');
}

// Mitarbeiter işlemleri
function openWorkerOverlay() {
    const data = getWorkerData();
    document.getElementById('workerList').innerHTML = data[currentSchicht]
        .map(w => `<div class="worker-item" onclick="addStaff('${w}')">${w}</div>`).join('');
    document.getElementById('workerOverlay').style.display = 'flex';
}

function closeWorkerOverlay() {
    document.getElementById('workerOverlay').style.display = 'none';
}

function addStaff(name) {
    if (!selectedStaff.includes(name)) selectedStaff.push(name);
    closeWorkerOverlay();
    renderStaff();
}

function addManualWorker() {
    const val = document.getElementById('manualWorker').value.trim();
    if (val) { selectedStaff.push("✍️ " + val); document.getElementById('manualWorker').value = ''; }
    closeWorkerOverlay();
    renderStaff();
}

function removeStaff(name) {
    selectedStaff = selectedStaff.filter(x => x !== name);
    renderStaff();
}

function renderStaff() {
    document.getElementById('workerDisplay').innerHTML = selectedStaff.map(s =>
        `<span class="chip">${s} <span class="remove" onclick="removeStaff('${s}')">✕</span></span>`
    ).join('');
    checkForm();
}

// Anlage değişimi
function onAnlageChange(val) {
    document.getElementById('ftBox').style.display = val.startsWith('PUR') ? 'block' : 'none';
    document.getElementById('comTimeBox').style.display = val === 'COM' ? 'block' : 'none';
    document.getElementById('artikelContainer').innerHTML = '';
    document.getElementById('addArtikelBtn').disabled = val === '';
    checkForm();
}
