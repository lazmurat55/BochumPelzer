<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APG TEST</title>
    <style>
        body { background: #0f172a; color: white; font-family: Arial; padding: 20px; text-align: center; }
        input { padding: 15px; margin: 10px; width: 250px; font-size: 16px; border-radius: 10px; border: none; }
        button { padding: 15px 40px; background: #38bdf8; color: #0f172a; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin: 10px; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; max-width: 400px; margin: 50px auto; }
        #mesaj { margin-top: 20px; font-size: 16px; }
    </style>
</head>
<body>

<div class="card" id="loginBox">
    <h2>⚡ APG LOGIN TEST</h2>
    <input type="text" id="userInp" placeholder="Kullanıcı adı"><br>
    <input type="password" id="passInp" placeholder="Şifre"><br>
    <button onclick="girisYap()">GİRİŞ YAP</button>
    <div id="mesaj"></div>
</div>

<div class="card" id="anaEkran" style="display:none;">
    <h2>✅ HOŞGELDİNİZ!</h2>
    <p id="kullaniciAdi"></p>
    <button onclick="cikisYap()">ÇIKIŞ</button>
</div>

<script>
// TEST ŞİFRELERİ
const SIFRELER = {
    "Keskin": "admin123",
    "Test": "test123"
};

function girisYap() {
    const kullanici = document.getElementById('userInp').value.trim();
    const sifre = document.getElementById('passInp').value.trim();
    const mesaj = document.getElementById('mesaj');
    
    console.log("Giriş denemesi:", kullanici);
    
    if (!kullanici || !sifre) {
        mesaj.innerHTML = "❌ Kullanıcı adı ve şifre girin!";
        mesaj.style.color = "red";
        return;
    }
    
    if (SIFRELER[kullanici] && SIFRELER[kullanici] === sifre) {
        mesaj.innerHTML = "";
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('anaEkran').style.display = 'block';
        document.getElementById('kullaniciAdi').innerHTML = "👤 " + kullanici;
    } else {
        mesaj.innerHTML = "❌ Hatalı kullanıcı adı veya şifre!<br><small>Deneyin: Test / test123</small>";
        mesaj.style.color = "red";
    }
}

function cikisYap() {
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('anaEkran').style.display = 'none';
    document.getElementById('userInp').value = '';
    document.getElementById('passInp').value = '';
}

console.log("✅ JavaScript çalışıyor!");
</script>

</body>
</html>
