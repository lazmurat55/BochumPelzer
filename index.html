<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APG BOCHUM</title>
    <link rel="apple-touch-icon" href="https://www.adlerpelzer.com/wp-content/uploads/2021/09/cropped-APG-Favicon-192x192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    <style>
        body{background:#0f172a;color:#fff;font-family:Arial;padding:10px;min-height:100vh;padding-bottom:50px}
        html{scroll-behavior:smooth}
        #loginScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:#0f172a;display:flex;justify-content:center;align-items:center;z-index:999}
        .login-card{background:#1e293b;padding:30px;border-radius:20px;border:2px solid #38bdf8;width:400px;text-align:center}
        h2{color:#38bdf8}
        input,select{width:100%;padding:12px;margin:6px 0;border-radius:8px;border:1px solid #475569;background:#334155;color:#fff;font-size:14px;box-sizing:border-box}
        button{padding:12px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;font-size:14px;width:100%;margin-top:10px}
        .btn-p{background:#38bdf8;color:#0f172a}
        .btn-p:disabled{background:#475569;color:#94a3b8}
        .btn-o{background:transparent;border:2px dashed #38bdf8;color:#38bdf8;margin-top:8px}
        .btn-s{background:#0284c7;color:#fff;padding:6px 12px;font-size:12px;width:auto}
        .btn-d{background:#f43f5e;color:#fff;padding:6px 12px;font-size:12px;width:auto}
        #mainApp,#adminPanel{max-width:750px;background:#1e293b;padding:20px;border-radius:20px;margin:auto;border:1px solid #475569;display:none}
        #adminPanel{max-width:1100px}
        .header{text-align:center;border-bottom:3px solid #38bdf8;padding-bottom:10px;margin-bottom:15px}
        label{display:block;margin:10px 0 3px;color:#38bdf8;font-weight:bold;font-size:11px;text-transform:uppercase}
        .g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
        .sbtn{padding:10px;background:#334155;border:1px solid #475569;border-radius:8px;text-align:center;font-weight:bold;font-size:13px;cursor:pointer}
        .sbtn.act{background:#38bdf8;color:#0f172a}
        .chip{display:inline-flex;align-items:center;gap:4px;background:rgba(56,189,248,0.15);border:1px solid rgba(56,189,248,0.3);padding:5px 10px;border-radius:20px;font-size:12px;margin:2px}
        .chip span{color:#f43f5e;cursor:pointer;font-weight:bold}
        .acard{background:#334155;padding:12px;border-radius:12px;margin-top:10px;border:1px solid #475569}
        .coderow{display:flex;gap:6px;align-items:center;margin-top:6px;background:#1e293b;padding:8px;border-radius:8px;flex-wrap:wrap}
        .coderow select{flex:2;min-width:130px}
        .coderow input{flex:1;min-width:50px}
        .badge{display:inline-block;padding:3px 8px;border-radius:12px;font-size:10px;font-weight:bold;margin-top:5px}
        .badge-ok{background:#4ade80;color:#0f172a}
        .badge-warn{background:#fb923c;color:#0f172a}
        .badge-err{background:#f43f5e;color:#fff}
        .ftg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:8px}
        .ftb{padding:8px;background:#334155;border:1px solid #475569;border-radius:6px;text-align:center;font-size:12px;font-weight:bold;cursor:pointer}
        .ftb.act{background:#0284c7;color:#fff}
        .comtrack{background:rgba(56,189,248,0.1);border:2px solid #38bdf8;padding:12px;border-radius:12px;margin-top:10px;text-align:center}
        .comtrack .big{font-size:26px;font-weight:bold;color:#38bdf8}
        .comtrack .bar{height:8px;background:#334155;border-radius:4px;margin-top:8px;overflow:hidden}
        .comtrack .fill{height:100%;background:#38bdf8;border-radius:4px}
        #workerOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;justify-content:center;align-items:center}
        .overlay{background:#1e293b;width:90%;max-width:450px;max-height:80vh;overflow-y:auto;border-radius:20px;padding:20px}
        .witem{padding:10px;border-bottom:1px solid #475569;cursor:pointer}
        .witem:hover{background:#334155;color:#38bdf8}
        .err{color:#f43f5e;font-size:13px;margin-top:8px;display:none}
        .info{color:#94a3b8;font-size:11px;margin-top:8px}
        .rbox{background:#334155;border:1px solid #475569;padding:15px;border-radius:15px;margin-bottom:10px}
        .ban{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:bold;background:#38bdf8;color:#0f172a;margin-bottom:6px}
        .fbtn{padding:8px;background:#334155;border:1px solid #475569;border-radius:6px;color:#fff;font-weight:bold;font-size:13px;cursor:pointer}
        .fbtn.act{background:#0284c7;border-color:#38bdf8}
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <h2>⚡ APG LOGIN</h2>
        <p style="color:#94a3b8">Adler Pelzer Group - Bochum</p>
        <input type="text" id="userInp" placeholder="Nachname">
        <input type="password" id="passInp" placeholder="Passwort">
        <button class="btn-p" onclick="doLogin()">ANMELDEN</button>
        <p id="loginError" class="err"></p>
        <p class="info">Test: Test / test123 | Admin: Keskin / admin123</p>
    </div>
</div>

<div id="mainApp">
    <div class="header"><h2>Adler Pelzer Group</h2><p id="userDisp" style="color:#4ade80;font-weight:bold;margin-top:5px"></p></div>
    <div class="g2">
        <div><label>📌 Schicht</label><div class="g3"><div class="sbtn" id="mA" onclick="setS('A')">A</div><div class="sbtn act" id="mB" onclick="setS('B')">B</div><div class="sbtn" id="mC" onclick="setS('C')">C</div></div></div>
        <div><label>⏳ Schichtart</label><div class="g3"><div class="sbtn" id="tF" onclick="setT('Frühschicht')">Früh</div><div class="sbtn act" id="tS" onclick="setT('Spätschicht')">Spät</div><div class="sbtn" id="tN" onclick="setT('Nachtschicht')">Nacht</div></div></div>
    </div>
    <label>👥 Mitarbeiter</label>
    <div id="wdisp" style="display:flex;flex-wrap:wrap;gap:3px;min-height:25px;margin-bottom:8px"></div>
    <button class="btn-o" onclick="openW()">➕ Mitarbeiter hinzufügen</button>
    <div class="g2" style="margin-top:10px">
        <div><label>📅 Datum</label><input type="date" id="datum"></div>
        <div><label>🏭 Anlage</label><select id="anlage" onchange="onAn()"><option value="">Bitte wählen...</option><optgroup label="PUR"><option>PUR1</option><option>PUR2</option><option>PUR3</option><option>PUR4</option><option>PUR5</option><option>PUR6</option><option>PUR7</option><option>PUR8</option><option>PUR9</option></optgroup><optgroup label="Spritzguss"><option>IM1</option><option>IM2</option><option>IM3</option><option>IM4</option><option>IM5</option><option>CIM1</option></optgroup><option>COM</option></select></div>
    </div>
    <div id="ftBox" style="display:none;margin-top:10px"><label>🧩 Formträger</label><div class="ftg"><div class="ftb" onclick="this.classList.toggle('act')">FT1</div><div class="ftb" onclick="this.classList.toggle('act')">FT2</div><div class="ftb" onclick="this.classList.toggle('act')">FT3</div><div class="ftb" onclick="this.classList.toggle('act')">FT4</div><div class="ftb" onclick="this.classList.toggle('act')">FT5</div><div class="ftb" onclick="this.classList.toggle('act')">FT6</div></div></div>
    <div id="comBox" style="display:none"><div class="comtrack"><span style="color:#38bdf8;font-weight:bold">⏱️ COMPOUND ZEIT</span><div class="big"><span id="comTot">0</span> / 480 Min</div><div class="bar"><div class="fill" id="comBar" style="width:0%"></div></div><span id="comWarn" style="font-size:12px;color:#4ade80"></span></div></div>
    <div id="artCont"></div>
    <button class="btn-o" id="addArtBtn" disabled onclick="addArt()">📦 + Artikel hinzufügen</button>
    <button class="btn-p" id="sendBtn" disabled onclick="send()">🚀 SPEICHERN & SENDEN</button>
</div>

<div id="adminPanel">
    <div class="header">
        <h2>📊 Admin Dashboard</h2>
        <p id="adminDisp" style="color:#38bdf8;font-weight:bold;margin-top:3px"></p>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;max-width:400px;margin:10px auto">
            <button class="fbtn" id="fA" onclick="filt('A')">🔵 A</button>
            <button class="fbtn act" id="fB" onclick="filt('B')">🟢 B</button>
            <button class="fbtn" id="fC" onclick="filt('C')">🟠 C</button>
        </div>
        <button class="btn-s" onclick="loadDash()" style="margin:8px auto;display:block">🔄 Aktualisieren</button>
    </div>
    <div id="repCont" style="display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:15px"></div>
</div>

<div id="workerOverlay"><div class="overlay"><h3 style="color:#38bdf8">👥 Mitarbeiter</h3><div id="wList"></div><input type="text" id="manW" placeholder="✏️ Manuell..."><button class="btn-s" onclick="addMan()">➕</button><button class="btn-p" onclick="closeW()">Schließen</button></div></div>

<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz9yjitkqV8gS5xPfEpX1TjqCGMGb5necgLZ1E6OjFoIeFgHejG2cMiP8nH9WDe3dnQTw/exec";
var PW = {"Keskin":"admin123","Test":"test123","Keskin Mur.":"murat123","Keskin Mustafa":"musti123"};
var curUser="",curS="B",curT="Spätschicht",staff=[],artCnt=0,filtS="B";

var WORKERS={A:["Kunert M.","Karali O.","Mikuczynski K.","Türkmen E.","Amrouch M.","Stania D.","Kantaroglu A.","Krancioch A.","Held D.","Berisha I.","Neji M.","Mulugeta G.","Udezue P.","Jansen M.","Aksoy O.","Yildirim S.","Brand N.","Louze A.","Blanquez Romero V.","Diallo M.D.","Sener E.","Klomrit","Garcia"],B:["Keskin Mur.","Aldirmaz P.","Anderwald R.","Bayrakli F.","Kilic D.","Maafi T.","Besche T.","Eickhoff P.","Toth Renata","Gibba n.","Helf A.","Isbir J.","Jeyakumar S.","Kalisch T.","Kowarsch R.","Nowak M.","Pähler D.","Patarcsity V.","Pulendran K.","Sahin E.","Savas S.","Schiavitelli","Uluyüz B.","Uzun S.","Klomrit","Garcia"],C:["Beher T.","Keskin Mustafa","Kantaroglu Ö.","Savas R.","Rafo S.","Gertz Kevin","Gertz S.","Schönborn Ch.","Fortes Ch.","Sakaguchi M.","Mercan M.","Krämer Ch.","Juretzka T.","Kumbara E.","Skupio D.","Skrago T.","Bah A.","Kaya A.","Jdea A.","Toure A.","Schneider D.","Tchaleu Bertrand","Keskinmus","Klomrit","Garcia"]};
var CODES={PUR:{aus:["6-2-01 Temperatur zu niedrig","6-2-02 Schaum haftet nicht","6-2-03 Einlegefehler","6-2-04 Schussabbruch","6-2-05 CIM nicht voll","6-2-06 Lippe gerissen","6-2-07 CIM gerissen","7-2-01 Nacharbeit","Sonstige"],stoer:["3-01 WZ-Wechsel","3-02 Mat-Umst.","4-2-01 Ungepl. Inst. WZ","4-2-02 Ungepl. Inst. Masch","4-2-03 Poly/Iso Überdruck","4-2-04 Mischkopf nio","4-2-05 Fehler Lichtschr.","4-2-06 Trennmittelpist.","4-2-07 Formträger Prob.","4-2-08 Reinigung WZ","4-2-09 Not Aus","5-2-01 Logistik Mangel","5-2-02 Keine Teile","5-2-04 Wartezeit Einrichter","5-2-10 Poly/Iso leer","Sonstige"]},Spritz:{aus:["6-1-01 Anfahrschrott","6-1-02 Mat-Umst.","6-1-03 CIM n.voll","6-1-04 CIM gerissen","6-1-06 Einfallstellen","6-1-07 Brandstellen","6-1-08 Silberstreifen","Sonstige"],stoer:["3-01 WZ-Wechsel","3-02 Mat-Umst.","4-1-01 Ungepl. Inst. WZ","4-1-02 Ungepl. Inst. Masch","4-1-03 Mat-Förderung","4-1-04 Dosierprobleme","4-1-05 Schließeinheit","4-1-06 Teileentnahme","4-1-07 WZ-Heizung","4-1-08 Beflammung","5-1-01 Mat-Mangel","5-1-03 Wartezeit Einrichter","Sonstige"]},COM:{aus:["6-3-01 Anfahrschrott","6-3-02 Mat-Fehler","Sonstige"],stoer:["3-01 WZ-Wechsel","3-02 Mat-Umst.","4-3-01 Messer schleifen","4-3-02 Ungepl. Inst. Masch","4-3-04 Silowechsel","5-3-01 Mat-Mangel","5-3-05 Feueralarm","Sonstige"]}};

// ============ LOGIN ============
function doLogin(){var u=document.getElementById('userInp').value.trim();var p=document.getElementById('passInp').value.trim();var e=document.getElementById('loginError');if(!u||!p){e.innerText="❌ Bitte alles ausfüllen!";e.style.display='block';return;}if(PW[u]&&PW[u]===p){e.style.display='none';enterApp(u);}else{e.innerText="❌ Falscher Name oder Passwort!";e.style.display='block';}}

function enterApp(u){
    curUser=u;document.getElementById('loginScreen').style.display='none';
    var d=new Date();document.getElementById('datum').value=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(u==="Keskin"){
        document.getElementById('adminPanel').style.display='block';
        document.getElementById('adminDisp').innerHTML='👑 Admin: '+u;
        loadDash();
    }else{
        document.getElementById('mainApp').style.display='block';
        document.getElementById('userDisp').innerHTML='👤 '+u;
        var f='B';
        if(WORKERS.A.some(function(w){return w.includes(u)||u.includes(w.split(' ')[0]);}))f='A';
        if(WORKERS.C.some(function(w){return w.includes(u)||u.includes(w.split(' ')[0]);}))f='C';
        setS(f);
    }
}

// ============ SCHICHT ============
function setS(s){curS=s;['A','B','C'].forEach(function(x){document.getElementById('m'+x).classList.remove('act');});document.getElementById('m'+s).classList.add('act');staff=[];renderStaff();if(s==='A')setT('Frühschicht');else if(s==='B')setT('Spätschicht');else setT('Nachtschicht');}
function setT(t){curT=t;['tF','tS','tN'].forEach(function(x){document.getElementById(x).classList.remove('act');});if(t==='Frühschicht')document.getElementById('tF').classList.add('act');else if(t==='Spätschicht')document.getElementById('tS').classList.add('act');else document.getElementById('tN').classList.add('act');}

// ============ MITARBEITER ============
function openW(){document.getElementById('wList').innerHTML=WORKERS[curS].map(function(w){return'<div class="witem" onclick="addS(\''+w+'\')">'+w+'</div>';}).join('');document.getElementById('workerOverlay').style.display='flex';}
function closeW(){document.getElementById('workerOverlay').style.display='none';}
function addS(n){if(staff.indexOf(n)===-1)staff.push(n);closeW();renderStaff();}
function addMan(){var v=document.getElementById('manW').value.trim();if(v){staff.push('✍️ '+v);document.getElementById('manW').value='';closeW();renderStaff();}}
function remS(n){staff=staff.filter(function(x){return x!==n;});renderStaff();}
function renderStaff(){document.getElementById('wdisp').innerHTML=staff.map(function(s){return'<span class="chip">'+s+' <span onclick="remS(\''+s+'\')">✕</span></span>';}).join('');checkF();}

// ============ ANLAGE ============
function onAn(){var v=document.getElementById('anlage').value;document.getElementById('ftBox').style.display=v.startsWith('PUR')?'block':'none';document.getElementById('comBox').style.display=v==='COM'?'block':'none';document.getElementById('artCont').innerHTML='';document.getElementById('addArtBtn').disabled=v==='';updateCom();checkF();}

// ============ ARTIKEL ============
function addArt(){var id=Date.now()+artCnt++;var an=document.getElementById('anlage').value;var cat=an==='COM'?'COM':(an.startsWith('PUR')?'PUR':'Spritz');var div=document.createElement('div');div.className='acard';div.id='a_'+id;var comF='';if(an==='COM')comF='<label>⏱️ Dauer (Min)</label><input type="number" class="adur" placeholder="Minuten" oninput="updateCom();checkF()" style="margin-bottom:6px">';div.innerHTML='<div style="display:flex;justify-content:space-between"><h4>📦 Artikel #'+artCnt+'</h4><span class="btn-d" onclick="this.closest(\'.acard\').remove();updateCom();checkF()">✕</span></div><input type="text" class="aname" placeholder="Artikelnummer" style="margin-bottom:6px">'+comF+'<div class="g2" style="margin-bottom:6px"><div><label style="margin:0;font-size:10px">✅ Gutteile</label><input type="number" class="agut" placeholder="Stk" oninput="checkF()"></div><div><label style="margin:0;font-size:10px">❌ Ausschuss Gesamt</label><input type="number" class="aaus" placeholder="Stk" oninput="checkAus(this);checkF()"></div></div><div class="raus"></div><div class="rsto"></div><div style="display:flex;gap:6px;margin-top:6px"><span class="btn-s" onclick="addRow(\''+id+'\',\'aus\',\''+cat+'\')">+ Ausschuss Grund</span><span class="btn-s" onclick="addRow(\''+id+'\',\'stoer\',\''+cat+'\')">+ Störung Grund</span></div><div class="aus-status"></div>';document.getElementById('artCont').appendChild(div);updateCom();checkF();}
function addRow(aid,type,cat){var card=document.getElementById('a_'+aid);var cont=card.querySelector('.r'+type);var div=document.createElement('div');div.className='coderow';div.innerHTML='<select class="'+type+'-sel" onchange="togS(this)">'+CODES[cat][type].map(function(c){return'<option>'+c+'</option>';}).join('')+'</select><input type="number" class="'+type+'-val" placeholder="'+(type==='aus'?'Stk':'Min')+'" oninput="if(type===\'aus\')checkAus(this.closest(\'.acard\').querySelector(\'.aaus\'));updateCom();checkF()"><input type="text" class="sinp" placeholder="Grund manuell..." style="display:none;flex:2"><span onclick="this.closest(\'.coderow\').remove();updateCom();checkF()" style="color:#f43f5e;cursor:pointer;font-size:18px">✕</span>';cont.appendChild(div);}
function togS(sel){sel.closest('.coderow').querySelector('.sinp').style.display=sel.value==='Sonstige'?'block':'none';}
function checkAus(input){if(!input)return;var card=input.closest('.acard');if(!card)return;var total=parseInt(input.value)||0;var sum=0;card.querySelectorAll('.aus-val').forEach(function(v){sum+=parseInt(v.value)||0;});var sd=card.querySelector('.aus-status');if(!sd)return;if(total===0&&sum===0){sd.innerHTML='';}else if(total===0&&sum>0){sd.innerHTML='<span class="badge badge-warn">⚠️ Gesamt fehlt! '+sum+' Stk</span>';}else if(sum!==total){sd.innerHTML='<span class="badge badge-err">❌ '+sum+'/'+total+' Stk</span>';}else{sd.innerHTML='<span class="badge badge-ok">✅ OK: '+total+' Stk</span>';}}
function updateCom(){var an=document.getElementById('anlage').value;if(an!=='COM')return;var total=0;document.querySelectorAll('.adur').forEach(function(v){total+=parseInt(v.value)||0;});document.getElementById('comTot').innerText=total;var pct=Math.min((total/480)*100,100);document.getElementById('comBar').style.width=pct+'%';}
function checkF(){var btn=document.getElementById('sendBtn');if(!btn)return;btn.disabled=!(staff.length>0&&document.getElementById('anlage').value!==''&&document.querySelectorAll('.acard').length>0);}

// ============ GOOGLE SHEETS'E GÖNDER ============
function send(){
    var btn=document.getElementById('sendBtn');btn.disabled=true;btn.innerText='⏳ SENDEN...';
    var an=document.getElementById('anlage').value;
    var da=document.getElementById('datum').value;
    var fts=[];document.querySelectorAll('.ftb.act').forEach(function(b){fts.push(b.innerText);});
    if(an==='COM'){var t=0;document.querySelectorAll('.adur').forEach(function(v){t+=parseInt(v.value)||0;});if(t>480){alert('⚠️ Compound: '+t+'/480 Min!');btn.disabled=false;btn.innerText='🚀 SPEICHERN & SENDEN';return;}}
    var data={action:"saveReport",schicht:curS,schichtType:curT,mitarbeiter:staff.join(", "),datum:da,anlage:an,formtraeger:fts.join(", "),user:curUser,rows:[]};
    document.querySelectorAll('.acard').forEach(function(card){
        var aname=card.querySelector('.aname').value.trim()||'Unbekannt';
        var agut=card.querySelector('.agut').value||'0';
        var aaus=card.querySelector('.aaus').value||'0';
        var adur=card.querySelector('.adur')?card.querySelector('.adur').value:'';
        var ausDetails=[],stoerDetails=[];
        card.querySelectorAll('.aus-sel').forEach(function(s,i){var v=card.querySelectorAll('.aus-val')[i];if(v&&v.value){var txt=s.value==='Sonstige'?(card.querySelectorAll('.sinp')[i]?card.querySelectorAll('.sinp')[i].value.trim():s.value):s.value;ausDetails.push(txt+' ('+v.value+' Stk)');}});
        card.querySelectorAll('.stoer-sel').forEach(function(s,i){var v=card.querySelectorAll('.stoer-val')[i];if(v&&v.value){var txt=s.value==='Sonstige'?(card.querySelectorAll('.sinp')[i]?card.querySelectorAll('.sinp')[i].value.trim():s.value):s.value;stoerDetails.push(txt+' ('+v.value+' Min)');}});
        data.rows.push({artikelNummer:aname,dauer:adur,gutteile:agut,ausschussGesamt:aaus,ausschussDetails:ausDetails.join(" | ")||'Keine',stoerungDetails:stoerDetails.join(" | ")||'Keine'});
    });
    fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(data)})
    .then(function(r){return r.json();})
    .then(function(result){
        if(result.status==='success'){alert('✅ ERFOLGREICH!\n\nSchicht '+data.schicht+' gespeichert!');document.getElementById('artCont').innerHTML='';staff=[];renderStaff();document.getElementById('anlage').value='';onAn();}
        else{alert('❌ Fehler: '+(result.message||'Unbekannt'));}
    })
    .catch(function(e){alert('❌ Verbindungsfehler!\n\n'+e.message);})
    .finally(function(){btn.disabled=false;btn.innerText='🚀 SPEICHERN & SENDEN';checkF();});
}

// ============ DASHBOARD ============
function loadDash(){
    var c=document.getElementById('repCont');
    c.innerHTML='<p style="text-align:center;color:#94a3b8;grid-column:1/-1">⏳ Laden...</p>';
    fetch(SCRIPT_URL+'?action=getReports&schicht='+filtS)
    .then(function(r){return r.json();})
    .then(function(d){
        if(!d||d.length===0){c.innerHTML='<p style="text-align:center;color:#94a3b8;grid-column:1/-1">📭 Keine Daten für Schicht '+filtS+'</p>';return;}
        c.innerHTML='';
        d.forEach(function(r){
            var b=document.createElement('div');b.className='rbox';
            b.innerHTML='<span class="ban">'+r.anlage+'</span><div style="font-size:12px;color:#e2e8f0;margin-bottom:4px">📅 '+r.datum+' | '+r.schichtType+'</div><div style="font-size:14px;font-weight:bold;color:#fff">📦 '+r.artikelNummer+'</div><div style="font-size:13px;color:#facc15;font-weight:bold">✅ Gut: '+r.gutteile+' | ❌ Aus: '+r.ausschussGesamt+'</div><div style="font-size:12px;color:#94a3b8;margin-top:5px">⚠️ '+r.ausschussDetails+'</div><div style="font-size:13px;margin-top:8px;border-top:1px solid #475569;padding-top:8px;color:#fff;font-weight:bold">👥 '+r.mitarbeiter+'</div>';
            c.appendChild(b);
        });
    })
    .catch(function(e){c.innerHTML='<p style="text-align:center;color:#f43f5e;grid-column:1/-1">❌ '+e.message+'</p>';});
}

function filt(s){
    filtS=s;
    ['A','B','C'].forEach(function(x){document.getElementById('f'+x).classList.remove('act');});
    document.getElementById('f'+s).classList.add('act');
    loadDash();
}
</script>
