// Passwörter verschlüsselt oder live aus Google Sheet ziehen
async function loadPasswordsFromSheet() {
    try {
        const response = await fetch(`${scriptURL}?action=getSifreler&_cb=${Date.now()}`);
        if (!response.ok) throw new Error("Netzwerkantwort war nicht ok");
        return await response.json();
    } catch(e) {
        console.error("Passwörter konnten nicht geladen werden:", e);
        return {};
    }
}

// Login-Prüfung
async function checkLogin() {
    const u = document.getElementById('userInp').value.trim();
    const p = document.getElementById('passInp').value.trim();
    const errorDiv = document.getElementById('loginError');
    
    if(!u || !p) {
        errorDiv.innerText = "❌ Bitte Name und Passwort eingeben!";
        errorDiv.style.display = 'block';
        return;
    }
    
    errorDiv.innerText = "⏳ Verbindung wird aufgebaut...";
    errorDiv.style.display = 'block';
    
    const tokenDb = await loadPasswordsFromSheet();
    
    if(tokenDb[u] && tokenDb[u].toString() === p.toString()) {
        enterApp(u, tokenDb);
    } else {
        errorDiv.innerText = "❌ Falscher Benutzername oder Passwort!";
        errorDiv.style.display = 'block';
    }
}

// App-Steuerung nach erfolgreichem Login
function enterApp(u, tokenDb = {}) { 
    loggedInUser = u; 
    document.getElementById('loginScreen').style.display = 'none'; 
    setInitialTodayDate();
    
    if (u === superAdmin) {
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('adminUserDisplay').innerHTML = "👑 Haupt-Admin: " + u;
        document.getElementById('rightsManagementBox').style.display = 'flex';
        document.getElementById('adminFilterGroup').style.display = 'grid';
        loadUserSelect(tokenDb);
        updateManagersList();
        filterSchicht(activeFilterSchicht);
        startAutoRefresh(); 
    } 
    else if (schichtLeiterDb[u]) {
        const assignedSchicht = schichtLeiterDb[u];
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('adminUserDisplay').innerHTML = `🏃 Schichtleiter: ${u} (Schicht ${assignedSchicht})`;
        document.getElementById('rightsManagementBox').style.display = 'none';
        
        document.querySelectorAll('.filter-btn').forEach(btn => btn.style.display = 'none');
        const targetBtn = document.getElementById('flt' + assignedSchicht);
        if(targetBtn) {
            targetBtn.style.display = 'inline-block';
            targetBtn.classList.add('active-filter');
        }
        filterSchicht(assignedSchicht);
        startAutoRefresh(); 
    } 
    else {
        document.getElementById('mainApp').style.display = 'block'; 
        document.getElementById('currentUserDisplay').innerHTML = "👤 Angemeldet: " + u; 
        let foundSchicht = "B";
        if(workerData["A"].some(w => w.includes(u))) foundSchicht = "A";
        if(workerData["C"].some(w => w.includes(u))) foundSchicht = "C";
        setSchicht(foundSchicht); 
    }
}

// Automatischer Dashboard-Wechsel während des Schichtwechsels
function startAutoRefresh() {
    if(autoRefreshInterval) clearInterval(autoRefreshInterval);
    autoRefreshInterval = setInterval(() => {
        const now = new Date();
        const hrs = now.getHours();
        const mins = now.getMinutes();
        const currentTimeNum = (hrs * 100) + mins;
        
        const isVardiya1 = (currentTimeNum >= 1330 && currentTimeNum <= 1400); 
        const isVardiya2 = (currentTimeNum >= 2130 && currentTimeNum <= 2210); 
        const isVardiya3 = (currentTimeNum >= 530  && currentTimeNum <= 610);  

        if (isVardiya1 || isVardiya2 || isVardiya3) {
            if (!window.lastRefreshTime || (now - window.lastRefreshTime >= 90000)) {
                window.lastRefreshTime = now;
                loadAdminDashboard(); 
            }
        }
    }, 10000); 
}

function saveNewPassword() { alert("Passwort geändert"); enterApp(loggedInUser); }

// Berechtigungsliste füllen
function loadUserSelect(tokenDb) {
    const select = document.getElementById('rightsSelect');
    const users = Object.keys(tokenDb).filter(x => x !== superAdmin);
    
    let html = '<option value="">Mitarbeiter wählen...</option>' + 
               '<option value="__CLEAR_ALL__" style="color:var(--danger); font-weight:bold;">⚠️ Alle Berechtigungen löschen</option>';
    
    users.forEach(u => {
        html += `<option value="${u}">${u}</option>`;
    });
    select.innerHTML = html;
}

function handleRightsSelectChange(value) {
    if (value === "__CLEAR_ALL__") {
        if (confirm("Möchten Sie wirklich ALLE Schichtleiter-Berechtigungen löschen?")) {
            schichtLeiterDb = {};
            localStorage.setItem('apg_schichtleiter_db', JSON.stringify(schichtLeiterDb));
            updateManagersList();
            alert("🗑️ Alle Berechtigungen wurden gelöscht.");
        }
        document.getElementById('rightsSelect').value = "";
    }
}

function grantSchichtleiterRights() {
    const name = document.getElementById('rightsSelect').value;
    const schicht = document.getElementById('assignedSchichtSelect').value;
    if(!name) { alert("Bitte einen Mitarbeiter wählen!"); return; }
    schichtLeiterDb[name] = schicht;
    localStorage.setItem('apg_schichtleiter_db', JSON.stringify(schichtLeiterDb));
    updateManagersList();
    alert(`✅ ${name} wurde für Schicht ${schicht} autorisiert.`);
}

function removeSchichtleiterRight(name) {
    if (confirm(`Möchten Sie die Berechtigung für ${name} wirklich löschen?`)) {
        delete schichtLeiterDb[name];
        localStorage.setItem('apg_schichtleiter_db', JSON.stringify(schichtLeiterDb));
        updateManagersList();
        alert(`❌ Berechtigung für ${name} wurde aufgehoben.`);
    }
}

function updateManagersList() { 
    let listText = "Aktiv: ";
    const entries = Object.entries(schichtLeiterDb);
    if(entries.length === 0) { listText += "Keine Leiter zugewiesen"; } 
    else { listText += entries.map(([name, schicht]) => `${name} (${schicht})<span class="delete-manager-btn" onclick="removeSchichtleiterRight('${name}')" title="Löschen">✕</span>`).join(', '); }
    document.getElementById('currentManagersList').innerHTML = listText; 
}

// Schicht & Mitarbeiter-Handling
function setSchicht(s) { 
    currentSchicht = s; 
    document.querySelectorAll('.schicht-btn').forEach(btn => {
        if(!btn.classList.contains('type-btn')) btn.classList.remove('active');
    });
    document.getElementById('mSchicht' + s)?.classList.add('active');
    
    selectedStaff = []; 
    renderStaff(); 
    
    if (s === "A") setSchichtType('Frühschicht');
    else if (s === "B") setSchichtType('Spätschicht');
    else if (s === "C") setSchichtType('Nachtschicht');
}

function setSchichtType(t) { 
    currentSchichtType = t; 
    document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
    if(t === 'Frühschicht') document.getElementById('tFrueh')?.classList.add('active');
    if(t === 'Spätschicht') document.getElementById('tSpaet')?.classList.add('active');
    if(t === 'Nachtschicht') document.getElementById('tNacht')?.classList.add('active');
}

function openWorkerOverlay() { 
    document.getElementById('workerList').innerHTML = workerData[currentSchicht].map(w => `<div class="worker-opt" onclick="addStaff('${w}')">${w}</div>`).join(""); 
    document.getElementById('workerOverlay').style.display='flex'; 
}
function addStaff(n) { if(!selectedStaff.includes(n)) selectedStaff.push(n); closeOverlay(); renderStaff(); }
function addManualWorker() { const v = document.getElementById('manualWorker').value.trim(); if(v) { selectedStaff.push("✍️ "+v); document.getElementById('manualWorker').value=""; closeOverlay(); renderStaff(); } }
function closeOverlay() { document.getElementById('workerOverlay').style.display='none'; }
function renderStaff() { document.getElementById('workerDisplayContainer').innerHTML = selectedStaff.map(s => `<div class="selected-worker"><span>${s}</span><span onclick="removeStaff('${s}')" style="color:var(--danger); cursor:pointer;">✕</span></div>`).join(""); liveCheck(); }
function removeStaff(n) { selectedStaff = selectedStaff.filter(x => x !== n); renderStaff(); }

function onAnlageChange(v) { 
    document.getElementById('ftBox').style.display = v.startsWith("PUR") ? "block" : "none"; 
    document.getElementById('comTimeBox').style.display = v === "COM" ? "block" : "none"; 
    document.getElementById('artikelContainer').innerHTML = ""; 
    document.getElementById('addArtikelBtn').disabled = v === "";
    liveCheck(); 
}

// Artikel & Maskengenerierung
let artikelCounter = 0;
function addArtikel() {
    const id = Date.now() + artikelCounter++; 
    const div = document.createElement('div'); div.className = "section-card artikel-row"; div.id = `art_${id}`;
    div.innerHTML = `<button onclick="this.parentElement.remove(); liveCheck();" style="position:absolute; right:10px; top:10px; background:var(--danger); color:white; border:none; border-radius:5px; width:26px; height:26px; cursor:pointer;">✕</button>
        <label>📌 Artikelnummer</label><input type="text" class="art-name" placeholder="z.B. 123456">
        ${document.getElementById('anlage').value==='COM' ? '<label>⏱️ Dauer (Min)</label><input type="number" class="art-duration" placeholder="Minuten" oninput="liveCheck()">' : ''}
        <div class="grid-2"><div><label>✅ Gutteile</label><input type="number" class="art-gut" placeholder="Stk. (Optional)" oninput="liveCheck()"></div><div><label>❌ Aus Gesamt</label><input type="number" class="art-aus-total" placeholder="Stk. (Optional)" oninput="liveCheck()"></div></div>
        <div class="status-badge" id="badge_${id}"></div><div id="rows_${id}"></div>
        <div style="display:flex; gap:10px; margin-top:10px;"><button class="sub-btn" onclick="addRow('${id}','aus')">+ Ausschuss</button><button class="sub-btn" onclick="addRow('${id}','stoer')">+ Störung</button></div>`;
    document.getElementById('artikelContainer').appendChild(div);
    liveCheck();
}

function addRow(artId, type) {
    const anl = document.getElementById('anlage').value; 
    const cat = anl==='COM'?'COM':(anl.startsWith("PUR")?'PUR':'Spritz');
    const div = document.createElement('div'); div.className="code-row";
    div.innerHTML = `<div class="code-row-inputs">
        <select class="${type}-select" style="flex:3;">
            ${codeData[cat][type].map(c => `<option value="${c}">${c}</option>`).join("")}
        </select>
        <input type="number" class="${type}-value" style="flex:1; min-width:80px;" placeholder="${type==='aus'?'Stk':'Min'}" oninput="liveCheck()">
        <button onclick="this.parentElement.parentElement.remove(); liveCheck();" style="color:var(--danger); background:none; border:none; font-size:18px; cursor:pointer;">✕</button></div>
        <input type="text" class="sonstige-input" placeholder="Grund manuell..." style="display:none;">`;
    
    document.getElementById(`rows_${artId}`).appendChild(div);
    const select = div.querySelector(`.${type}-select`);
    const sonstInput = div.querySelector('.sonstige-input');
    select.onchange = () => { sonstInput.style.display = select.value === 'Sonstige' ? 'block' : 'none'; };
    liveCheck();
}

// Live-Eingabeprüfung & Schalthebel-Freigabe
function liveCheck() {
    let isValid = true; 
    let cT = 0;
    const sendBtn = document.getElementById('mainSendBtn');
    
    const hasWorkers = selectedStaff.length > 0;
    const hasAnlage = document.getElementById('anlage').value !== "";
    const artikelRows = document.querySelectorAll('.artikel-row');
    const hasRows = artikelRows.length > 0;
    
    artikelRows.forEach(row => {
        const id = row.id.split('_')[1]; 
        const artName = row.querySelector('.art-name').value.trim();
        const t = parseInt(row.querySelector('.art-aus-total').value) || 0;
        
        if(!artName) isValid = false;
        
        let s = 0; 
        row.querySelectorAll('.aus-value').forEach(i => s += parseInt(i.value) || 0);
        const b = document.getElementById('badge_' + id);
        
        if (s > 0 && t === 0) {
            b.className="status-badge status-ok"; 
            b.innerText = "✅ Auto-Anpassung: " + s;
        } 
        else if(t > 0 && t !== s) { 
            b.className="status-badge status-ok"; 
            b.innerText = "ℹ️ Info: " + s + " von " + t + " erfasst"; 
        } else if(t > 0) { 
            b.className="status-badge status-ok"; 
            b.innerText = "✅ OK: " + s + "/" + t; 
        } else { 
            b.innerText=""; 
        }
        
        if(document.getElementById('anlage').value === 'COM') {
            cT += (parseInt(row.querySelector('.art-duration').value) || 0);
        }
    });
    
    if(document.getElementById('anlage').value === 'COM') {
        document.getElementById('comTotal').innerText = cT;
    }
    
    // Aktivierungsbedingung für den Hauptbutton
    if(hasWorkers && hasAnlage && hasRows && isValid) {
        sendBtn.disabled = false;
    } else {
        sendBtn.disabled = true;
    }
}

// 🚀 DATEN VERARBEITEN & AN GOOGLE SHEETS SENDEN
async function processReport() {
    const sendBtn = document.getElementById('mainSendBtn');
    sendBtn.disabled = true;
    sendBtn.innerText = "⏳ Wird gesendet...";
    
    const datum = document.getElementById('datum').value;
    const anlage = document.getElementById('anlage').value;
    
    // Formträger-Selektion auslesen (falls PUR)
    let selectedFTs = [];
    if(anlage.startsWith("PUR")) {
        document.querySelectorAll('#ftBox .ft-btn.active').forEach(btn => {
            selectedFTs.push(btn.innerText);
        });
    }
    
    let payload = {
        action: "saveReport",
        user: loggedInUser,
        schicht: currentSchicht,
        schichtType: currentSchichtType,
        datum: datum,
        anlage: anlage,
        formtraeger: selectedFTs.join(", "),
        mitarbeiter: selectedStaff.join(", "),
        artikel: []
    };
    
    document.querySelectorAll('.artikel-row').forEach(row => {
        const artName = row.querySelector('.art-name').value.trim();
        const gutteile = row.querySelector('.art-gut').value || "0";
        const ausTotal = row.querySelector('.art-aus-total').value || "0";
        const duration = row.querySelector('.art-duration') ? row.querySelector('.art-duration').value : "0";
        
        let ausschussDetails = [];
        row.querySelectorAll('.code-row').forEach(cRow => {
            const ausSelect = cRow.querySelector('.aus-select');
            const ausVal = cRow.querySelector('.aus-value');
            if(ausSelect && ausVal && ausVal.value) {
                let grund = ausSelect.value;
                if(grund === 'Sonstige') grund = cRow.querySelector('.sonstige-input').value || 'Sonstige';
                ausschussDetails.push(`${grund}: ${ausVal.value} Stk`);
            }
            
            const stoerSelect = cRow.querySelector('.stoer-select');
            const stoerVal = cRow.querySelector('.stoer-value');
            if(stoerSelect && stoerVal && stoerVal.value) {
                let grund = stoerSelect.value;
                if(grund === 'Sonstige') grund = cRow.querySelector('.sonstige-input').value || 'Sonstige';
                ausschussDetails.push(`${grund}: ${stoerVal.value} Min`);
            }
        });
        
        payload.artikel.push({
            name: artName,
            gutteile: gutteile,
            ausschussGesamt: ausTotal,
            dauer: duration,
            details: ausschussDetails.join(" | ")
        });
    });
    
    try {
        const response = await fetch(scriptURL, {
            method: "POST",
            body: JSON.stringify(payload)
        });
        const resData = await response.json();
        if(resData.status === "success") {
            alert("🚀 Schichtbericht erfolgreich übermittelt!");
            // Maske zurücksetzen
            document.getElementById('artikelContainer').innerHTML = "";
            selectedStaff = [];
            renderStaff();
            document.getElementById('anlage').value = "";
            onAnlageChange("");
        } else {
            alert("❌ Fehler beim Speichern: " + resData.message);
        }
    } catch(e) {
        console.error(e);
        alert("❌ Netzwerkfehler! Konnte nicht an Google Sheets übertragen.");
    } finally {
        sendBtn.innerText = "🚀 SPEICHERN & SENDEN";
        liveCheck();
    }
}

// 📊 DASHBOARD LOGIK (FILTERN & RENDER)
function filterSchicht(s) {
    activeFilterSchicht = s;
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active-filter'));
    document.getElementById('flt' + s)?.classList.add('active-filter');
    loadAdminDashboard();
}

async function loadAdminDashboard() {
    const container = document.getElementById('reportsContainer');
    container.innerHTML = "<p style='grid-column: 1/-1; text-align:center; color:var(--primary);'>⏳ Lade Live-Schichtdaten aus Google Sheets...</p>";
    
    try {
        const response = await fetch(`${scriptURL}?action=getReports&schicht=${activeFilterSchicht}&_cb=${Date.now()}`);
        const reports = await response.json();
        
        if(!reports || reports.length === 0) {
            container.innerHTML = "<p style='grid-column: 1/-1; text-align:center; color:var(--text-muted);'>Keine Berichte für diese Schicht heute vorhanden.</p>";
            return;
        }
        
        container.innerHTML = reports.map(r => `
            <div class="report-box">
                <span class="badge-origin">${r.anlage} ${r.formtraeger ? '- ' + r.formtraeger : ''}</span>
                <div class="report-date">📅 ${r.datum} | ⏳ ${r.schichtType} (${r.schicht})</div>
                <div class="report-artikel">📦 Artikel: ${r.artikelName}</div>
                <div class="report-ausschuss">✅ Gut: ${r.gutteile} Stk | ❌ Ausschuss: ${r.ausschussGesamt} Stk</div>
                <div class="report-störung">📝 Details: ${r.details || 'Keine Ausfälle'}</div>
                <div class="report-workers">👥 Team: ${r.mitarbeiter}</div>
                <div style="font-size:11px; margin-top:5px; color:var(--text-muted); text-align:right;">Erstellt von: ${r.user}</div>
            </div>
        `).join('');
        
    } catch(e) {
        container.innerHTML = "<p style='grid-column: 1/-1; text-align:center; color:var(--danger);'>❌ Fehler beim Abrufen der Dashboard-Daten.</p>";
        console.error(e);
    }
}
</script>
